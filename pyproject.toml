[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "easydatafix"
version = "0.1.0"
description = "A Python library to automatically clean and prepare datasets for analysis."
readme = "README.md"
requires-python = ">=3.10"

authors = [
    { name = "Suneel Kumar" }
]

license = { text = "MIT" }

dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.26.0",
]
[tool.setuptools.packages.find]
include = ["easydatafix*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
