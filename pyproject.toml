[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "easydatafix"
version = "0.1.0"
description = "A Python library to automatically clean and prepare datasets for analysis."
readme = "README.md"
requires-python = ">=3.10"

authors = [
    { name = "Suneel Kumar" }
]

license = { text = "MIT" }

dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.26.0",
]
